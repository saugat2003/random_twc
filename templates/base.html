{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="random_twc — Clean, professional random chat platform.">
    <title>{% block title %}random_twc{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if messages %}
    <div class="toast-container" id="toast-container">
        {% for message in messages %}
        <div class="toast toast-{{ message.tags }}" role="alert">
            <span class="toast-text">{{ message }}</span>
            <button class="toast-close" onclick="this.parentElement.remove()">×</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}

    <script>
        // Auto-dismiss toasts
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.toast').forEach((toast, i) => {
                setTimeout(() => {
                    toast.style.animation = 'slideOut 0.3s ease forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 4000 + i * 500);
            });
        });
    </script>
</body>
</html>
